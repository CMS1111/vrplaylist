<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Video Player</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --ink:#04060a;
  --ink2:#0b0f14;
  --surface:#111820;
  --raised:#1a2330;
  --border:rgba(255,255,255,0.07);
  --hi:#e8ff47;
  --hi-dim:rgba(232,255,71,0.1);
  --hi-border:rgba(232,255,71,0.25);
  --muted:#3d5060;
  --text:#c8dae8;
  --danger:#ff4d6d;
  --safe:#2dff9e;
  --warn:#ff9f43;
  --sidebar:300px;
  --hud:52px;
}

html,body{height:100%;overflow:hidden;font-family:'Syne',sans-serif;background:var(--ink);color:var(--text)}

/* ═══ LAYOUT ═══ */
#app{display:flex;height:100vh;overflow:hidden}

/* ═══ SIDEBAR ═══ */
#sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--ink2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;z-index:10;
}

.sb-logo{
  padding:18px 16px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.sb-logo-mark{
  width:32px;height:32px;border-radius:8px;
  background:var(--hi);display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--ink);font-weight:800;flex-shrink:0;
}
.sb-logo-text{font-size:15px;font-weight:700;color:var(--text);letter-spacing:.5px}
.sb-logo-text span{color:var(--hi)}

.sb-section{padding:12px 12px 8px;border-bottom:1px solid var(--border)}
.sb-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  color:var(--muted);letter-spacing:2px;text-transform:uppercase;
  margin-bottom:8px;display:block;
}

/* URL input */
.url-row{display:flex;gap:6px}
.url-row input{
  flex:1;min-width:0;padding:9px 11px;
  background:var(--raised);border:1.5px solid var(--border);
  border-radius:8px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:10px;
  transition:border-color .2s;
}
.url-row input:focus{outline:none;border-color:var(--hi)}
.url-row input::placeholder{color:var(--muted)}

/* Buttons */
.btn{
  padding:9px 14px;border:none;border-radius:8px;
  font-family:'Syne',sans-serif;font-size:11px;font-weight:600;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn:hover{filter:brightness(1.12);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-hi{background:var(--hi);color:var(--ink)}
.btn-ghost{background:var(--raised);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:rgba(255,77,109,.12);color:var(--danger);border:1px solid rgba(255,77,109,.2)}
.btn-sm{padding:6px 10px;font-size:10px;border-radius:6px}

/* Mode pills */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.mode-pill{
  padding:8px 6px;border:1.5px solid var(--border);border-radius:8px;
  background:var(--raised);cursor:pointer;transition:all .15s;
  text-align:center;font-size:10px;font-weight:600;color:var(--muted);
}
.mode-pill:hover{border-color:var(--hi-border);color:var(--text)}
.mode-pill.active{
  border-color:var(--hi);background:var(--hi-dim);color:var(--hi);
}
.mode-pill .pill-icon{font-size:16px;display:block;margin-bottom:3px}

/* Playlist */
.playlist-header{
  padding:12px 12px 8px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.pl-count{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  color:var(--muted);letter-spacing:1px;
}

.playlist{flex:1;overflow-y:auto;padding:8px}
.pl-empty{
  text-align:center;padding:32px 12px;
  color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.8;
}
.pl-item{
  display:flex;align-items:center;gap:8px;padding:9px 10px;
  border-radius:8px;border:1px solid transparent;cursor:pointer;transition:all .15s;
}
.pl-item:hover{background:var(--raised)}
.pl-item.active{background:var(--hi-dim);border-color:var(--hi-border)}
.pl-num{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  color:var(--muted);width:18px;text-align:right;flex-shrink:0;
}
.pl-item.active .pl-num{color:var(--hi)}
.pl-name{
  flex:1;font-size:11px;font-weight:600;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;
}
.pl-item.active .pl-name{color:var(--hi)}
.pl-del{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:12px;padding:2px 5px;border-radius:4px;opacity:0;transition:all .15s;
}
.pl-item:hover .pl-del{opacity:1}
.pl-del:hover{color:var(--danger);background:rgba(255,77,109,.1)}

/* Bulk / import */
.bulk-textarea{
  width:100%;height:80px;padding:9px 11px;resize:vertical;
  background:var(--raised);border:1.5px solid var(--border);
  border-radius:8px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:10px;transition:border-color .2s;
}
.bulk-textarea:focus{outline:none;border-color:var(--hi)}
.bulk-textarea::placeholder{color:var(--muted)}
.row-gap{display:flex;gap:5px;margin-top:6px}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--hi-border);border-radius:2px}

/* ═══ MAIN CANVAS AREA ═══ */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;min-width:0}

#canvas-wrap{
  flex:1;position:relative;background:#000;overflow:hidden;
}
#vrCanvas{width:100%;height:100%;display:block}

/* Placeholder */
#placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;pointer-events:none;
}
.ph-ring{
  width:80px;height:80px;border-radius:50%;border:2px solid var(--hi-border);
  display:flex;align-items:center;justify-content:center;font-size:32px;
  animation:pulse 2.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--hi-dim)}50%{box-shadow:0 0 0 14px transparent}}
.ph-text{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px}

/* Status bar */
#statusBar{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(11,15,20,.85);backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:20px;
  padding:5px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--muted);white-space:nowrap;pointer-events:none;
  transition:color .25s,opacity .25s;opacity:0;
  z-index:50;
}
#statusBar.show{opacity:1}
#statusBar.ok{color:var(--safe)}
#statusBar.err{color:var(--danger)}
#statusBar.warn{color:var(--warn)}

/* ═══ HUD CONTROLS ═══ */
#hud{
  height:var(--hud);background:var(--ink2);border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0;
}

/* Seek bar */
.seek-wrap{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}
.seek-bar-track{
  position:relative;height:4px;background:var(--raised);border-radius:2px;cursor:pointer;
}
.seek-bar-buf{
  position:absolute;left:0;top:0;height:100%;background:var(--muted);
  border-radius:2px;transition:width .5s linear;pointer-events:none;
}
.seek-bar-fill{
  position:absolute;left:0;top:0;height:100%;background:var(--hi);
  border-radius:2px;pointer-events:none;
}
.seek-bar-thumb{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:10px;height:10px;border-radius:50%;background:var(--hi);
  box-shadow:0 0 6px var(--hi);pointer-events:none;transition:transform .1s;
}
.seek-bar-track:hover .seek-bar-thumb{transform:translate(-50%,-50%) scale(1.3)}
.seek-time{display:flex;justify-content:space-between}
.time-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);
}

.hud-btn{
  width:34px;height:34px;border-radius:8px;border:1px solid var(--border);
  background:var(--raised);color:var(--text);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;flex-shrink:0;font-size:14px;
}
.hud-btn:hover{border-color:var(--hi-border);color:var(--hi)}
.hud-btn:disabled{opacity:.25;cursor:not-allowed}
.hud-btn.active{border-color:var(--hi);color:var(--hi);background:var(--hi-dim)}
.hud-sep{width:1px;height:26px;background:var(--border);flex-shrink:0}

/* VR button */
#vrBtn{
  padding:0 14px;height:34px;border-radius:8px;
  background:var(--hi);color:var(--ink);border:none;
  font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
  cursor:pointer;transition:all .15s;flex-shrink:0;
  display:flex;align-items:center;gap:6px;
}
#vrBtn:hover{filter:brightness(1.1)}
#vrBtn:disabled{opacity:.3;cursor:not-allowed}

/* Zoom slider overlay */
#zoomPanel{
  position:absolute;right:14px;bottom:calc(var(--hud) + 10px);
  background:rgba(11,15,20,.9);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;display:none;z-index:60;
  flex-direction:column;gap:8px;min-width:160px;
}
#zoomPanel.open{display:flex}
.zoom-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px}
.zoom-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--hi);font-weight:500}
input[type=range]{
  width:100%;accent-color:var(--hi);cursor:pointer;
  height:4px;border-radius:2px;
}
</style>
</head>
<body>
<div id="app">

<!-- ══ SIDEBAR ══ -->
<div id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-mark">VR</div>
    <div class="sb-logo-text">VOID<span>PLAY</span></div>
  </div>

  <!-- URL load -->
  <div class="sb-section">
    <span class="sb-label">Load Video</span>
    <div class="url-row">
      <input type="text" id="urlInput" placeholder="https://…/video.mp4" autocomplete="off" spellcheck="false">
      <button class="btn btn-hi btn-sm" id="loadBtn">▶</button>
    </div>
  </div>

  <!-- Projection mode -->
  <div class="sb-section">
    <span class="sb-label">Projection Mode</span>
    <div class="mode-grid">
      <div class="mode-pill active" data-mode="360">
        <span class="pill-icon">🌐</span>360°
      </div>
      <div class="mode-pill" data-mode="180">
        <span class="pill-icon">🔭</span>180°
      </div>
      <div class="mode-pill" data-mode="flat">
        <span class="pill-icon">🎬</span>Flat / 2D
      </div>
      <div class="mode-pill" data-mode="dual">
        <span class="pill-icon">👁</span>2D Dual
      </div>
    </div>
  </div>

  <!-- Add single / bulk -->
  <div class="sb-section">
    <span class="sb-label">Add to Playlist</span>
    <div class="url-row">
      <input type="text" id="singleInput" placeholder="Add URL…" autocomplete="off" spellcheck="false">
      <button class="btn btn-ghost btn-sm" id="singleAddBtn">+</button>
    </div>
    <div style="margin-top:7px">
      <textarea class="bulk-textarea" id="bulkArea" placeholder="Bulk — one URL per line&#10;https://…"></textarea>
      <div class="row-gap">
        <button class="btn btn-ghost btn-sm" id="bulkAddBtn" style="flex:1">Add All</button>
        <button class="btn btn-ghost btn-sm" id="importBtn">Import</button>
        <button class="btn btn-ghost btn-sm" id="exportBtn">Export</button>
      </div>
    </div>
  </div>

  <!-- Playlist -->
  <div class="playlist-header">
    <span class="sb-label" style="margin:0">Playlist</span>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="pl-count" id="plCount">0 videos</span>
      <button class="btn btn-danger btn-sm" id="clearAllBtn">Clear</button>
    </div>
  </div>
  <div class="playlist" id="playlist">
    <div class="pl-empty">No videos.<br>Add a URL above.</div>
  </div>
</div>

<!-- ══ MAIN ══ -->
<div id="main">
  <div id="canvas-wrap">
    <canvas id="vrCanvas"></canvas>

    <div id="placeholder">
      <div class="ph-ring">▶</div>
      <div class="ph-text">Load a video to begin</div>
    </div>

    <div id="statusBar"></div>

    <!-- Zoom panel -->
    <div id="zoomPanel">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="zoom-label">FOV / ZOOM</span>
        <span class="zoom-val" id="zoomVal">90°</span>
      </div>
      <input type="range" id="zoomSlider" min="30" max="150" value="90" step="1">
      <button class="btn btn-ghost btn-sm" id="zoomReset" style="width:100%;margin-top:2px">Reset</button>
    </div>
  </div>

  <!-- ══ HUD ══ -->
  <div id="hud">
    <!-- Prev / Play / Next -->
    <button class="hud-btn" id="prevBtn" title="Previous (←)" disabled>⏮</button>
    <button class="hud-btn" id="playBtn" title="Play/Pause (Space)" disabled>▶</button>
    <button class="hud-btn" id="nextBtn" title="Next (→)" disabled>⏭</button>

    <div class="hud-sep"></div>

    <!-- Seek -->
    <div class="seek-wrap">
      <div class="seek-bar-track" id="seekTrack">
        <div class="seek-bar-buf"  id="seekBuf"  style="width:0%"></div>
        <div class="seek-bar-fill" id="seekFill" style="width:0%"></div>
        <div class="seek-bar-thumb" id="seekThumb" style="left:0%"></div>
      </div>
      <div class="seek-time">
        <span class="time-label" id="timeCur">0:00</span>
        <span class="time-label" id="timeDur">0:00</span>
      </div>
    </div>

    <div class="hud-sep"></div>

    <!-- Volume -->
    <button class="hud-btn" id="muteBtn" title="Mute (M)">🔊</button>
    <input type="range" id="volSlider" min="0" max="1" step="0.02" value="1" style="width:60px;accent-color:var(--hi);cursor:pointer">

    <div class="hud-sep"></div>

    <!-- Zoom toggle -->
    <button class="hud-btn" id="zoomToggleBtn" title="Zoom / FOV">⊕</button>

    <!-- Pan toggle -->
    <button class="hud-btn" id="panBtn" title="Mouse-drag pan">☩</button>

    <div class="hud-sep"></div>

    <!-- VR -->
    <button id="vrBtn" disabled>
      <span>⊙</span> Enter VR
    </button>
  </div>
</div>

</div>

<input type="file" id="importFile" accept=".txt,.json" style="display:none">

<!-- Three.js r128 from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
'use strict';

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
const state = {
  playlist:   [],   // [{url, name}]
  current:    -1,
  mode:       '360', // '360'|'180'|'flat'|'dual'
  videoEl:    null,
  panEnabled: false,
  vrSession:  null,
};

/* ══════════════════════════════════════════════
   DOM REFS
══════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const el = {
  urlInput:    $('urlInput'),
  loadBtn:     $('loadBtn'),
  statusBar:   $('statusBar'),
  placeholder: $('placeholder'),
  canvas:      $('vrCanvas'),
  canvasWrap:  $('canvas-wrap'),
  prevBtn:     $('prevBtn'),
  playBtn:     $('playBtn'),
  nextBtn:     $('nextBtn'),
  muteBtn:     $('muteBtn'),
  volSlider:   $('volSlider'),
  seekTrack:   $('seekTrack'),
  seekBuf:     $('seekBuf'),
  seekFill:    $('seekFill'),
  seekThumb:   $('seekThumb'),
  timeCur:     $('timeCur'),
  timeDur:     $('timeDur'),
  panBtn:      $('panBtn'),
  zoomToggle:  $('zoomToggleBtn'),
  zoomPanel:   $('zoomPanel'),
  zoomSlider:  $('zoomSlider'),
  zoomVal:     $('zoomVal'),
  zoomReset:   $('zoomReset'),
  vrBtn:       $('vrBtn'),
  singleInput: $('singleInput'),
  singleAddBtn:$('singleAddBtn'),
  bulkArea:    $('bulkArea'),
  bulkAddBtn:  $('bulkAddBtn'),
  importBtn:   $('importBtn'),
  exportBtn:   $('exportBtn'),
  clearAllBtn: $('clearAllBtn'),
  playlist:    $('playlist'),
  plCount:     $('plCount'),
  importFile:  $('importFile'),
};

/* ══════════════════════════════════════════════
   STATUS
══════════════════════════════════════════════ */
let statusTimer = null;
function setStatus(msg, type = '', persist = false) {
  el.statusBar.textContent = msg;
  el.statusBar.className = 'show ' + type;
  clearTimeout(statusTimer);
  if (!persist) statusTimer = setTimeout(() => el.statusBar.classList.remove('show'), 3000);
}

/* ══════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════ */
function fmtTime(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}
function getFilename(url) {
  try {
    const u = new URL(url);
    const parts = u.pathname.split('/').filter(Boolean);
    const last = parts[parts.length - 1];
    return last ? decodeURIComponent(last) : u.hostname;
  } catch { return url.substring(0, 40); }
}
function isValidUrl(url) {
  return typeof url === 'string' &&
    (url.startsWith('http://') || url.startsWith('https://')) &&
    url.length < 2000;
}
function truncate(s, n = 36) { return s.length > n ? s.slice(0, n - 1) + '…' : s; }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ══════════════════════════════════════════════
   THREE.JS SCENE
══════════════════════════════════════════════ */
const renderer = new THREE.WebGLRenderer({ canvas: el.canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.xr.enabled = true;

const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(90, 1, 0.1, 1000);
camera.position.set(0, 0, 0);
scene.add(camera);

// Spherical / mesh objects — created fresh per mode change
let meshMain = null;   // primary sphere / plane
let meshAux  = null;   // second copy for dual mode

// Video texture
let videoTexture = null;

function buildScene() {
  // Tear down old meshes
  if (meshMain) { scene.remove(meshMain); meshMain.geometry.dispose(); meshMain.material.dispose(); meshMain = null; }
  if (meshAux)  { scene.remove(meshAux);  meshAux.geometry.dispose();  meshAux.material.dispose();  meshAux = null; }

  if (!videoTexture) return;

  const mat = new THREE.MeshBasicMaterial({ map: videoTexture, side: THREE.BackSide });
  // For flat and dual we flip to FrontSide
  const matFlat = new THREE.MeshBasicMaterial({ map: videoTexture, side: THREE.FrontSide });

  switch (state.mode) {

    case '360': {
      // Full equirectangular sphere — camera sits inside
      const geo = new THREE.SphereGeometry(500, 60, 40);
      meshMain = new THREE.Mesh(geo, mat.clone());
      // mirror horizontally so text isn't reversed
      meshMain.scale.set(-1, 1, 1);
      scene.add(meshMain);
      camera.fov = parseFloat(el.zoomSlider.value);
      camera.updateProjectionMatrix();
      break;
    }

    case '180': {
      // Half-sphere — front hemisphere only (phi 0→π, theta -π/2→π/2)
      const geo = new THREE.SphereGeometry(500, 60, 40, -Math.PI / 2, Math.PI, 0, Math.PI);
      meshMain = new THREE.Mesh(geo, mat.clone());
      meshMain.scale.set(-1, 1, 1);
      scene.add(meshMain);
      camera.fov = parseFloat(el.zoomSlider.value);
      camera.updateProjectionMatrix();
      break;
    }

    case 'flat': {
      // Flat plane at z = -4, 16:9
      const geo = new THREE.PlaneGeometry(7.1, 4);
      meshMain = new THREE.Mesh(geo, matFlat);
      meshMain.position.set(0, 0, -4);
      scene.add(meshMain);
      camera.fov = parseFloat(el.zoomSlider.value);
      camera.updateProjectionMatrix();
      break;
    }

    case 'dual': {
      // Two side-by-side planes — left & right eye simulation
      const geo = new THREE.PlaneGeometry(3.4, 4);
      meshMain = new THREE.Mesh(geo, matFlat.clone());
      meshMain.position.set(-1.85, 0, -4);
      scene.add(meshMain);
      meshAux = new THREE.Mesh(geo.clone(), matFlat.clone());
      meshAux.position.set(1.85, 0, -4);
      scene.add(meshAux);
      camera.fov = parseFloat(el.zoomSlider.value);
      camera.updateProjectionMatrix();
      break;
    }
  }
}

// ── Render loop ──────────────────────────────
function animate() {
  renderer.setAnimationLoop(render);
}

function render() {
  if (videoTexture && state.videoEl && !state.videoEl.paused) {
    videoTexture.needsUpdate = true;
  }
  renderer.render(scene, camera);
}

// ── Resize ──────────────────────────────────
function resizeRenderer() {
  const w = el.canvasWrap.clientWidth;
  const h = el.canvasWrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resizeRenderer).observe(el.canvasWrap);
resizeRenderer();
animate();

/* ══════════════════════════════════════════════
   MOUSE-DRAG PAN (orbit-lite)
══════════════════════════════════════════════ */
const drag = { active: false, x: 0, y: 0, lon: 0, lat: 0 };

el.canvas.addEventListener('mousedown', e => {
  if (!state.panEnabled || !meshMain) return;
  drag.active = true;
  drag.x = e.clientX;
  drag.y = e.clientY;
  el.canvas.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
  if (!drag.active) return;
  const dx = e.clientX - drag.x;
  const dy = e.clientY - drag.y;
  drag.x = e.clientX;
  drag.y = e.clientY;
  drag.lon -= dx * 0.25;
  drag.lat += dy * 0.15;
  drag.lat = Math.max(-85, Math.min(85, drag.lat));
  applyPanRotation();
});
window.addEventListener('mouseup', () => {
  if (!drag.active) return;
  drag.active = false;
  el.canvas.style.cursor = state.panEnabled ? 'grab' : 'default';
});

// Touch pan
el.canvas.addEventListener('touchstart', e => {
  if (!state.panEnabled || !meshMain) return;
  const t = e.touches[0];
  drag.active = true; drag.x = t.clientX; drag.y = t.clientY;
}, { passive: true });
window.addEventListener('touchmove', e => {
  if (!drag.active) return;
  const t = e.touches[0];
  const dx = t.clientX - drag.x, dy = t.clientY - drag.y;
  drag.x = t.clientX; drag.y = t.clientY;
  drag.lon -= dx * 0.25; drag.lat += dy * 0.15;
  drag.lat = Math.max(-85, Math.min(85, drag.lat));
  applyPanRotation();
}, { passive: true });
window.addEventListener('touchend', () => { drag.active = false; });

function applyPanRotation() {
  const phi   = THREE.MathUtils.degToRad(90 - drag.lat);
  const theta = THREE.MathUtils.degToRad(drag.lon);
  const target = new THREE.Vector3(
    500 * Math.sin(phi) * Math.cos(theta),
    500 * Math.cos(phi),
    500 * Math.sin(phi) * Math.sin(theta)
  );
  camera.lookAt(target);
}

// Mouse-wheel zoom
el.canvas.addEventListener('wheel', e => {
  e.preventDefault();
  let fov = camera.fov + e.deltaY * 0.04;
  fov = Math.max(30, Math.min(150, fov));
  camera.fov = fov;
  camera.updateProjectionMatrix();
  el.zoomSlider.value = fov;
  el.zoomVal.textContent = Math.round(fov) + '°';
}, { passive: false });

/* ══════════════════════════════════════════════
   VIDEO LOADING
══════════════════════════════════════════════ */
async function loadVideo(url, fromPlaylist = false) {
  if (!isValidUrl(url)) { setStatus('Invalid URL', 'err'); return; }

  setStatus('Loading…', '', true);
  el.placeholder.style.display = 'none';

  // Tear down previous
  if (state.videoEl) {
    state.videoEl.pause();
    state.videoEl.src = '';
    state.videoEl.load();
  }
  if (videoTexture) { videoTexture.dispose(); videoTexture = null; }

  const video = document.createElement('video');
  video.crossOrigin = 'anonymous';
  video.loop  = false;
  video.muted = false;
  video.playsInline = true;
  video.preload = 'auto';
  video.volume = parseFloat(el.volSlider.value);
  video.src = url;

  state.videoEl = video;

  // Playlist management
  if (!fromPlaylist) {
    const idx = state.playlist.findIndex(v => v.url === url);
    if (idx === -1) {
      state.playlist.push({ url, name: getFilename(url) });
      state.current = state.playlist.length - 1;
      savePersist();
    } else { state.current = idx; }
    renderPlaylist();
  }

  // Texture
  videoTexture = new THREE.VideoTexture(video);
  videoTexture.minFilter = THREE.LinearFilter;
  videoTexture.magFilter = THREE.LinearFilter;
  videoTexture.format    = THREE.RGBFormat;

  buildScene();

  video.addEventListener('canplay', () => {
    video.play().catch(() => {});
    setStatus('▶ Playing', 'ok');
    el.playBtn.textContent = '⏸';
    el.playBtn.disabled = false;
    updateNavButtons();
    el.urlInput.value = url;
  });

  video.addEventListener('timeupdate', updateSeek);
  video.addEventListener('progress',   updateBuffered);
  video.addEventListener('durationchange', () => { el.timeDur.textContent = fmtTime(video.duration); });
  video.addEventListener('ended',   playNext);
  video.addEventListener('play',    () => { el.playBtn.textContent = '⏸'; });
  video.addEventListener('pause',   () => { el.playBtn.textContent = '▶'; });
  video.addEventListener('error',   () => setStatus('Playback error', 'err'));

  video.load();
}

/* ══════════════════════════════════════════════
   SEEK & BUFFERED
══════════════════════════════════════════════ */
function updateSeek() {
  const v = state.videoEl;
  if (!v || !v.duration) return;
  const pct = (v.currentTime / v.duration) * 100;
  el.seekFill.style.width  = pct + '%';
  el.seekThumb.style.left  = pct + '%';
  el.timeCur.textContent   = fmtTime(v.currentTime);
}

function updateBuffered() {
  const v = state.videoEl;
  if (!v || !v.duration || !v.buffered.length) return;
  const pct = (v.buffered.end(v.buffered.length - 1) / v.duration) * 100;
  el.seekBuf.style.width = pct + '%';
}

// Click-to-seek
let seeking = false;
function seekTo(e) {
  const v = state.videoEl;
  if (!v || !v.duration) return;
  const rect = el.seekTrack.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  v.currentTime = ratio * v.duration;
}
el.seekTrack.addEventListener('mousedown', e => { seeking = true; seekTo(e); });
window.addEventListener('mousemove', e => { if (seeking) seekTo(e); });
window.addEventListener('mouseup',   () => { seeking = false; });

/* ══════════════════════════════════════════════
   PLAYLIST
══════════════════════════════════════════════ */
function addToPlaylist(url, andPlay = false) {
  if (!isValidUrl(url)) return false;
  if (state.playlist.some(v => v.url === url)) return false;
  if (state.playlist.length >= 2000) return false;
  state.playlist.push({ url, name: getFilename(url) });
  savePersist();
  renderPlaylist();
  updateNavButtons();
  if (andPlay) {
    state.current = state.playlist.length - 1;
    loadVideo(url, true);
  }
  return true;
}

function removeFromPlaylist(idx) {
  state.playlist.splice(idx, 1);
  if (state.current === idx) state.current = -1;
  else if (state.current > idx) state.current--;
  savePersist(); renderPlaylist(); updateNavButtons();
}

function playFromPlaylist(idx) {
  if (idx < 0 || idx >= state.playlist.length) return;
  state.current = idx;
  renderPlaylist();
  loadVideo(state.playlist[idx].url, true);
}

function playNext() {
  if (!state.playlist.length) return;
  playFromPlaylist((state.current + 1) % state.playlist.length);
}
function playPrev() {
  if (!state.playlist.length) return;
  playFromPlaylist(state.current > 0 ? state.current - 1 : state.playlist.length - 1);
}

function updateNavButtons() {
  const has = state.playlist.length > 1;
  el.prevBtn.disabled = !has;
  el.nextBtn.disabled = !has;
}

function renderPlaylist() {
  el.plCount.textContent = `${state.playlist.length} video${state.playlist.length !== 1 ? 's' : ''}`;
  if (!state.playlist.length) {
    el.playlist.innerHTML = '<div class="pl-empty">No videos.<br>Add a URL above.</div>';
    return;
  }
  el.playlist.innerHTML = state.playlist.map((v, i) => `
    <div class="pl-item ${i === state.current ? 'active' : ''}" data-i="${i}">
      <div class="pl-num">${i + 1}</div>
      <div class="pl-name" title="${escHtml(v.url)}">${escHtml(truncate(v.name, 28))}</div>
      <button class="pl-del" data-del="${i}">✕</button>
    </div>`).join('');
}

el.playlist.addEventListener('click', e => {
  const d = e.target.closest('[data-del]');
  if (d) { removeFromPlaylist(parseInt(d.dataset.del)); return; }
  const item = e.target.closest('[data-i]');
  if (item) playFromPlaylist(parseInt(item.dataset.i));
});

/* ══════════════════════════════════════════════
   PERSIST
══════════════════════════════════════════════ */
function savePersist() {
  try { localStorage.setItem('voidplay_v1', JSON.stringify(state.playlist)); } catch(e) {}
}
function loadPersist() {
  try {
    const raw = localStorage.getItem('voidplay_v1');
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) {
      state.playlist = parsed.filter(v => v && isValidUrl(v.url));
      renderPlaylist(); updateNavButtons();
    }
  } catch(e) {}
}

/* ══════════════════════════════════════════════
   IMPORT / EXPORT
══════════════════════════════════════════════ */
function exportPlaylist() {
  if (!state.playlist.length) { setStatus('Playlist is empty', 'warn'); return; }
  const blob = new Blob([state.playlist.map(v => v.url).join('\n')], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'voidplay-playlist.txt';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(a.href);
}

el.importFile.addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file || file.size > 2e6) return;
  try {
    const text = await file.text();
    const lines = text.trim().startsWith('[')
      ? JSON.parse(text.trim()).map(v => typeof v === 'string' ? v : v.url)
      : text.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
    let added = 0;
    for (const url of lines) { if (isValidUrl(url) && addToPlaylist(url)) added++; }
    setStatus(`Imported ${added} video${added !== 1 ? 's' : ''}`, added > 0 ? 'ok' : 'warn');
  } catch { setStatus('Import failed', 'err'); }
  e.target.value = '';
});

/* ══════════════════════════════════════════════
   WEBXR
══════════════════════════════════════════════ */
async function checkXRSupport() {
  if (!navigator.xr) return;
  const ok = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
  el.vrBtn.disabled = !ok;
  if (!ok) el.vrBtn.title = 'WebXR not supported in this browser/device';
}

async function toggleVR() {
  if (state.vrSession) {
    await state.vrSession.end();
    state.vrSession = null;
    el.vrBtn.innerHTML = '<span>⊙</span> Enter VR';
    return;
  }
  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      requiredFeatures: ['local-floor'],
    });
    state.vrSession = session;
    renderer.xr.setSession(session);
    el.vrBtn.innerHTML = '<span>⊙</span> Exit VR';
    session.addEventListener('end', () => {
      state.vrSession = null;
      el.vrBtn.innerHTML = '<span>⊙</span> Enter VR';
    });
  } catch (err) {
    setStatus('VR session failed: ' + err.message, 'err');
  }
}

/* ══════════════════════════════════════════════
   MODE SWITCH
══════════════════════════════════════════════ */
document.querySelectorAll('.mode-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    state.mode = pill.dataset.mode;
    // Reset pan angles on mode switch
    drag.lon = 0; drag.lat = 0;
    camera.lookAt(0, 0, -1);
    buildScene();
    setStatus('Mode: ' + pill.textContent.trim(), 'ok');
  });
});

/* ══════════════════════════════════════════════
   ZOOM
══════════════════════════════════════════════ */
el.zoomToggle.addEventListener('click', () => {
  el.zoomPanel.classList.toggle('open');
  el.zoomToggle.classList.toggle('active');
});
el.zoomSlider.addEventListener('input', () => {
  const v = parseFloat(el.zoomSlider.value);
  camera.fov = v;
  camera.updateProjectionMatrix();
  el.zoomVal.textContent = Math.round(v) + '°';
});
el.zoomReset.addEventListener('click', () => {
  el.zoomSlider.value = 90;
  camera.fov = 90;
  camera.updateProjectionMatrix();
  el.zoomVal.textContent = '90°';
});

/* ══════════════════════════════════════════════
   PAN TOGGLE
══════════════════════════════════════════════ */
el.panBtn.addEventListener('click', () => {
  state.panEnabled = !state.panEnabled;
  el.panBtn.classList.toggle('active', state.panEnabled);
  el.canvas.style.cursor = state.panEnabled ? 'grab' : 'default';
  setStatus(state.panEnabled ? 'Pan: ON — drag to look around' : 'Pan: OFF', '');
});

/* ══════════════════════════════════════════════
   HUD EVENTS
══════════════════════════════════════════════ */
el.loadBtn.addEventListener('click', () => loadVideo(el.urlInput.value.trim()));
el.urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadVideo(el.urlInput.value.trim()); });

el.playBtn.addEventListener('click', () => {
  if (!state.videoEl) return;
  state.videoEl.paused ? state.videoEl.play() : state.videoEl.pause();
});

el.prevBtn.addEventListener('click', playPrev);
el.nextBtn.addEventListener('click', playNext);

el.muteBtn.addEventListener('click', () => {
  if (!state.videoEl) return;
  state.videoEl.muted = !state.videoEl.muted;
  el.muteBtn.textContent = state.videoEl.muted ? '🔇' : '🔊';
});
el.volSlider.addEventListener('input', () => {
  if (state.videoEl) state.videoEl.volume = parseFloat(el.volSlider.value);
});

el.vrBtn.addEventListener('click', toggleVR);

// Playlist sidebar controls
el.singleAddBtn.addEventListener('click', () => {
  const url = el.singleInput.value.trim();
  if (!url) return;
  if (addToPlaylist(url, true)) el.singleInput.value = '';
  else setStatus('Invalid or duplicate URL', 'warn');
});
el.singleInput.addEventListener('keydown', e => { if (e.key === 'Enter') el.singleAddBtn.click(); });

el.bulkAddBtn.addEventListener('click', () => {
  const lines = el.bulkArea.value.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#') && isValidUrl(l));
  let added = 0;
  for (const url of lines) { if (addToPlaylist(url)) added++; }
  if (added) { el.bulkArea.value = ''; setStatus(`Added ${added} videos`, 'ok'); }
  else setStatus('No valid URLs', 'warn');
});

el.importBtn.addEventListener('click', () => el.importFile.click());
el.exportBtn.addEventListener('click', exportPlaylist);

el.clearAllBtn.addEventListener('click', () => {
  if (!state.playlist.length || !confirm('Clear playlist?')) return;
  state.playlist = []; state.current = -1;
  savePersist(); renderPlaylist(); updateNavButtons();
});

/* ══════════════════════════════════════════════
   KEYBOARD SHORTCUTS
══════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  switch (e.code) {
    case 'Space':       e.preventDefault(); el.playBtn.click(); break;
    case 'ArrowRight':
      if (e.shiftKey)  { e.preventDefault(); playNext(); }
      else             { e.preventDefault(); if (state.videoEl) state.videoEl.currentTime += 10; }
      break;
    case 'ArrowLeft':
      if (e.shiftKey)  { e.preventDefault(); playPrev(); }
      else             { e.preventDefault(); if (state.videoEl) state.videoEl.currentTime -= 10; }
      break;
    case 'ArrowUp':    e.preventDefault(); if (state.videoEl) state.videoEl.volume = Math.min(1, state.videoEl.volume + 0.1); el.volSlider.value = state.videoEl?.volume ?? 1; break;
    case 'ArrowDown':  e.preventDefault(); if (state.videoEl) state.videoEl.volume = Math.max(0, state.videoEl.volume - 0.1); el.volSlider.value = state.videoEl?.volume ?? 1; break;
    case 'KeyM':       el.muteBtn.click(); break;
    case 'KeyP':       el.panBtn.click(); break;
    case 'KeyZ':       el.zoomToggle.click(); break;
    case 'BracketRight': el.zoomSlider.value = Math.min(150, parseFloat(el.zoomSlider.value) + 5); el.zoomSlider.dispatchEvent(new Event('input')); break;
    case 'BracketLeft':  el.zoomSlider.value = Math.max(30,  parseFloat(el.zoomSlider.value) - 5); el.zoomSlider.dispatchEvent(new Event('input')); break;
  }
});

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
loadPersist();
checkXRSupport();
</script>
</body>
</html>
